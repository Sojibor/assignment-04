<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/img/favicon.png" type="image/x-icon">
    <title>Job Application Tracker</title>
     <!--daisyUI + Tailwind CSS-->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <!--FontAwesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!--Google Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>
<body>
<!--Header-->
<header class="max-w-11/12 mx-auto mt-10 mb-10">
        <h1 class="text-3xl font-bold text-blue-900 mb-6">Job Application Tracker</h1>
        
        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border">
                <p class="text-gray-500 font-semibold">Total</p>
                <h2 id="total-count" class="text-4xl font-bold text-blue-900">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border">
                <p class="text-gray-500 font-semibold">Interview</p>
                <h2 id="interview-count" class="text-4xl font-bold text-green-600">0</h2>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border">
                <p class="text-gray-500 font-semibold">Rejected</p>
                <h2 id="rejected-count" class="text-4xl font-bold text-red-500">0</h2>
            </div>
        </div>
    </header>

<!--Main Tab Option-->
<section class="max-w-11/12 mx-auto">
        <div class="flex md:flex-row justify-between items-center mb-6">
            <h2 class="text-xl font-bold">Available Jobs</h2>
            <p class="text-gray-500"><span id="tab-count">8</span> jobs</p>
        </div>

        <div class="flex gap-2 mb-8">
            <button onclick="filterJobs('all')" class="btn btn-sm btn-primary active-tab">All</button>
            <button onclick="filterJobs('interview')" class="btn btn-sm">Interview</button>
            <button onclick="filterJobs('rejected')" class="btn btn-sm">Rejected</button>
        </div>

        <div id="job-container" class="grid grid-cols-1 gap-6">
            </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 bg-white rounded-xl border border-dashed">
            <img src="./img/jobs.png" class="w-24 mb-4 opacity-50" alt="No jobs">
            <h3 class="text-xl font-bold text-gray-700">No jobs available</h3>
            <p class="text-gray-400 text-sm">Check back soon for new job opportunities</p>
        </div>
</section>
    <script src="script.js"></script>
</body>
</html>
